<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Form Validation</title>
</head>

<body>
    <form class="form-container" id="form-container">
        <h1>Create Account</h1>
        <div class="input-control">
            <label>Username</label>
            <input type="text" id="username" min="8" placeholder="User1234" autofocus>
            <div class="error"></div>
        </div>
        <div class="input-control">
            <label>Email</label>
            <input type="email" id="email" placeholder="gmail@gmail.com">
            <div class="error"></div>
        </div>
        <div class="input-control">
            <label>Password</label>
            <input type="password" id="password" min="8">
            <div class="error"></div>
        </div>
        <div class="input-control">
            <label>Confirm Password</label>
            <input type="password" id="password-retry" min="8">
            <div class="error"></div>
        </div>




        <br>
        <input type="submit" id="submit-button">
    </form>
    <script src="index.js"></script>
</body>

</html>
