<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrome Checker</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
<h1>Palindrome Checker</h1>
<p>Input a word, so I can check if it is a palindrome.<br>
    A palindrome is a word that is the same when reading backwards.</p>
<input type="text" id="word" placeholder="Enter a word">
<button onclick="showResult(checkPalindrome())">Check Palindrome</button>
</body>
</html>
